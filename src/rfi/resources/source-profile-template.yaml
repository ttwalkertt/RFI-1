      - {id: sec_10q, short_name: 10-Q, label: Quarterly report on Form 10-Q, description: US quarterly statutory filing., default_enabled: false, addressability: deterministic, supported_retrieval_modes: [identifier, feed, direct_url], order: 20}
      - {id: sec_8k, short_name: 8-K, label: Current report on Form 8-K, description: US current-event statutory filing., default_enabled: false, addressability: deterministic, supported_retrieval_modes: [identifier, feed, direct_url], order: 30}
      - {id: sec_20f, short_name: 20-F, label: Annual report on Form 20-F, description: Foreign private issuer annual filing., default_enabled: false, addressability: deterministic, supported_retrieval_modes: [identifier, feed, direct_url], order: 40}
      - {id: sec_6k, short_name: 6-K, label: Report of foreign private issuer on Form 6-K, description: Foreign private issuer current report., default_enabled: false, addressability: deterministic, supported_retrieval_modes: [identifier, feed, direct_url], order: 50}
