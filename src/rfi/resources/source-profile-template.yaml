schema_version: 1

# This file is application data and the single acquisition-catalog authority. Keep list order
# stable. Python validates this schema but does not duplicate the categories or artifact items.
retrieval_fields:
  - name: priority
    label: Priority
    description: Positive integer ordering among candidates for this artifact.
    type: integer
    multiple: false
  - name: url
    label: URL or endpoint
    description: Configured retrieval, feed, listing, archive, or portal URL.
    type: url
    multiple: false
  - name: locator
    label: Stable locator
    description: Stable identifier such as a CIK, account, publication, API key name, or form.
    type: string
    multiple: false
  - name: preferred_domains
    label: Preferred domains
    description: Domains that bound or rank discovery without becoming retrieved provenance.
    type: string
    multiple: true
  - name: discovery_hints
    label: Discovery hints
    description: Bounded search phrases or operator guidance for future discovery.
    type: string
    multiple: true
  - name: expected_media_type
    label: Expected media type
    description: Optional expected response or artifact media type.
    type: string
    multiple: false
  - name: parser_hint
    label: Parser or adapter hint
    description: Optional future adapter or parser routing guidance.
    type: string
    multiple: false
  - name: operator_notes
    label: Candidate notes
    description: Operator context about this candidate; never retrieved evidence.
    type: string
    multiple: false

retrieval_modes:
  - mode: direct_url
    label: Direct URL
    description: A stable artifact or API endpoint can be addressed directly.
    supported_fields: [priority, url, expected_media_type, parser_hint, operator_notes]
    required_fields: [url]
    required_any: []
  - mode: feed
    label: Feed
    description: A stable RSS, Atom, API, or publication feed exposes artifacts.
    supported_fields: [priority, url, locator, expected_media_type, parser_hint, operator_notes]
    required_fields: []
    required_any: [url, locator]
  - mode: identifier
    label: Stable identifier
    description: A registry, platform, or adapter can locate artifacts from a stable identifier.
    supported_fields: [priority, locator, url, parser_hint, operator_notes]
    required_fields: [locator]
    required_any: []
  - mode: listing_page
    label: Listing or portal
    description: A stable page exists but individual artifacts must be discovered beneath it.
    supported_fields: [priority, url, preferred_domains, discovery_hints, parser_hint, operator_notes]
    required_fields: [url]
    required_any: []
  - mode: discovery
    label: Bounded discovery
    description: Search is bounded by preferred domains, phrases, or operator guidance.
    supported_fields: [priority, preferred_domains, discovery_hints, parser_hint, operator_notes]
    required_fields: []
    required_any: [preferred_domains, discovery_hints]

