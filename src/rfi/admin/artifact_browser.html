<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RFI Operator Console · Artifact Browser</title>
  <style>
    :root{--ink:#17212b;--muted:#607083;--line:#d7dee7;--blue:#2359d1;--paper:#fff;--wash:#f4f7fb;--danger:#9c3d20}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;color:var(--ink);background:var(--wash);font:14px/1.42 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
    header{height:64px;padding:0 24px;display:flex;align-items:center;gap:28px;color:#fff;background:#172334}header strong{font-size:18px}nav{display:flex;gap:10px}nav a{color:#fff;text-decoration:none;padding:20px 8px 17px;border-bottom:3px solid transparent;font-weight:700}nav a:hover{background:#ffffff14}nav a[aria-current]{border-color:#7db0ff}
    main{height:calc(100% - 64px);padding:14px;display:grid;grid-template-columns:minmax(280px,34%) 7px minmax(420px,1fr)}
    .pane{background:var(--paper);border:1px solid var(--line);min-width:0;overflow:hidden}.tree-pane{border-radius:10px 0 0 10px;display:flex;flex-direction:column}.detail-pane{border-radius:0 10px 10px 0;display:flex;flex-direction:column}
    .divider{cursor:col-resize;background:#e3e8ef;border-block:1px solid var(--line)}.divider:hover,.divider:focus{background:#91b2ef;outline:0}
    .pane-head{padding:15px 17px;border-bottom:1px solid var(--line)}h1,h2{margin:0}.muted{color:var(--muted)}#tree{overflow:auto;padding:10px;flex:1}.tree-node{margin:2px 0}.node-row{display:flex;align-items:center;gap:6px;width:100%;padding:7px 8px;border:0;border-radius:6px;background:transparent;text-align:left;color:inherit;font:inherit}.node-row:hover,.node-row.selected{background:#edf4ff}.node-row:focus{outline:2px solid #7aa4ef}.projection>.node-row{font-weight:750;background:#f7f9fc}.caret{width:16px;color:var(--muted)}.count{margin-left:auto;color:var(--muted);font-size:12px}.children{padding-left:18px}.state{padding:11px;color:var(--muted)}.error{color:var(--danger)}
    #empty{margin:auto;padding:30px;color:var(--muted);text-align:center}.hidden{display:none!important}#artifact-view{display:flex;flex-direction:column;min-height:0;height:100%}.artifact-head{padding:14px 17px;border-bottom:1px solid var(--line)}.artifact-head h2{font-size:19px}.actions,.observation-nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.actions a,.actions button,.observation-nav button{border:1px solid #aeb9c7;border-radius:6px;padding:7px 10px;background:#fff;color:var(--ink);font:inherit;font-weight:650;text-decoration:none}.actions a.primary{color:#fff;background:var(--blue);border-color:var(--blue)}.observation-nav button:disabled{opacity:.45}.observation-nav span{align-self:center;color:var(--muted)}
    #metadata-wrap{border-bottom:1px solid var(--line);max-height:42%;overflow:auto}#metadata-toggle{width:100%;padding:9px 16px;border:0;background:#f7f9fc;text-align:left;font-weight:700}#metadata{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px 16px;padding:13px 17px}.field{min-width:0}.field b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}.field span,.field code{overflow-wrap:anywhere}.wide{grid-column:1/-1}#preview{position:relative;flex:1;min-height:0;overflow:hidden;background:#eef1f5}#preview iframe{width:100%;height:100%;border:0;background:#fff}.preview-state{padding:22px}.badge{padding:3px 8px;border-radius:14px;background:#e8eef8;font-size:12px}.discussion-summary{height:100%;overflow:auto;background:#fff;padding:24px}.discussion-summary h3{margin:0 0 8px}.discussion-summary dl{display:grid;grid-template-columns:minmax(140px,220px) 1fr;gap:10px 18px;margin:22px 0}.discussion-summary dt{font-weight:750;color:var(--muted)}.discussion-summary dd{margin:0;overflow-wrap:anywhere}
    .message-viewer{height:100%;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden;background:#fff}.message-headers{border-bottom:1px solid var(--line);background:#f7f9fc}.message-headers-toggle{width:100%;padding:10px 16px;border:0;background:transparent;color:var(--ink);font:inherit;font-weight:750;text-align:left}.message-headers-toggle:hover,.message-headers-toggle:focus{background:#edf4ff;outline:0}.message-headers-content{max-height:min(30vh,240px);margin:0;padding:14px 17px;overflow:auto;white-space:pre-wrap;overflow-wrap:anywhere;background:#fff;border-top:1px solid var(--line)}.message-body{min-height:0;overflow:auto;overscroll-behavior:contain;padding:16px 18px 24px;background:#fff;scrollbar-gutter:stable}.message-body:focus{outline:3px solid #7aa4ef;outline-offset:-3px}.message-body h3{position:sticky;top:-16px;z-index:1;margin:-16px -18px 14px;padding:11px 18px;background:#f7f9fcee;border-bottom:1px solid var(--line);font-size:14px}.message-body pre{margin:0;white-space:pre-wrap;overflow-wrap:anywhere;font:13px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace}
    @media(max-width:800px){body{overflow:auto}header{height:auto;min-height:64px;align-items:flex-start;padding-block:14px}nav{flex-wrap:wrap}main{height:auto;display:block}.pane{border-radius:9px;margin-bottom:10px;min-height:430px}.divider{display:none}#metadata{grid-template-columns:1fr 1fr}.detail-pane{height:75vh}}
  </style>
</head>
<body>
<header><strong>RFI Operator Console</strong><!-- operator-navigation --></header>
<main id="layout">
  <section class="pane tree-pane"><div class="pane-head"><h1>Artifact Repository</h1><div class="muted">Repository projections · stored evidence · read only</div></div><div id="tree" role="tree" aria-label="Artifact repository tree"><div class="state">Loading repository…</div></div></section>
  <div id="divider" class="divider" role="separator" aria-orientation="vertical" tabindex="0" aria-label="Resize artifact tree"></div>
  <section class="pane detail-pane"><div id="empty"><h2>Select a stored artifact</h2><p>The stored repository copy is authoritative for inspection.</p></div><div id="artifact-view" class="hidden">
    <div class="artifact-head"><h2 id="title"></h2><div id="subtitle" class="muted"></div><div id="document-actions" class="actions"><a id="open-stored" class="primary" target="_blank" rel="noopener noreferrer">Open stored document in new tab</a><a id="open-source" target="_blank" rel="noopener noreferrer">Open original source</a></div><div class="observation-nav" aria-label="Artifact observations"><button id="previous-observation" type="button">Previous observation</button><span id="observation-label"></span><button id="next-observation" type="button">Next observation</button></div></div>
    <div id="metadata-wrap"><button id="metadata-toggle" type="button" aria-expanded="true">▾ Normalized metadata</button><div id="metadata"></div></div>
    <div id="preview"><div class="preview-state muted">Preview loading…</div></div>
  </div></section>
</main>
<script src="/admin/admin_preferences.js"></script>
<script>
'use strict';
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const preferences=RFIAdminPreferences,SPLIT='artifact_browser_split',COLLAPSED='artifact_browser_metadata_collapsed';let selected='',observationCursor='',previewArtifact='';
async function api(path){const response=await fetch(path);const data=await response.json();if(!response.ok)throw new Error(data.error||'Repository read failed');return data}
function row(label,count,expand,nodeId){const wrap=document.createElement('div');wrap.className='tree-node';const button=document.createElement('button');button.className='node-row';button.type='button';button.dataset.node=nodeId;button.setAttribute('role','treeitem');button.innerHTML=`<span class="caret">${expand?'▸':'•'}</span><span>${esc(label)}</span>${count===undefined?'':`<span class="count">${count}</span>`}`;wrap.append(button);if(expand){const children=document.createElement('div');children.className='children hidden';children.setAttribute('role','group');wrap.append(children)}return {wrap,button,children:wrap.querySelector('.children')};}
async function expandable(parent,label,count,nodeId,loader,onselect){const node=row(label,count,true,nodeId);parent.append(node.wrap);let loaded=false,open=false;node.button.onclick=async()=>{if(onselect)onselect(node.button);open=!open;node.button.querySelector('.caret').textContent=open?'▾':'▸';node.button.setAttribute('aria-expanded',String(open));node.children.classList.toggle('hidden',!open);if(open&&!loaded){node.children.innerHTML='<div class="state">Loading…</div>';try{await loader(node.children);loaded=true}catch(error){node.children.innerHTML=`<div class="state error">${esc(error.message)}</div>`}}};return node}
async function loadRepository(){try{const [firmData,listData,streamData]=await Promise.all([api('/api/artifacts/firms'),api('/api/mailing-lists/sources'),api('/api/streams')]);$('tree').innerHTML='';const firmRoot=await expandable($('tree'),'Firm artifacts',firmData.items.reduce((n,x)=>n+x.durable_artifact_count,0),'projection:firms',child=>loadFirmNodes(child,firmData.items));firmRoot.wrap.classList.add('projection');const listRoot=await expandable($('tree'),'Development mailing lists',listData.items.reduce((n,x)=>n+x.discussion_count,0),'projection:mailing-lists',child=>loadMailingSources(child,listData.items));listRoot.wrap.classList.add('projection');const streamRoot=await expandable($('tree'),'Artifact streams',streamData.items.reduce((n,x)=>n+x.membership_count,0),'projection:streams',child=>loadStreams(child,streamData.items));streamRoot.wrap.classList.add('projection')}catch(error){$('tree').innerHTML=`<div class="state error">${esc(error.message)}</div>`}}
async function loadFirmNodes(parent,firms){parent.innerHTML='';if(!firms.length){parent.innerHTML='<div class="state">No firm artifacts are stored.</div>';return}for(const firm of firms)await expandable(parent,firm.firm_name,firm.durable_artifact_count,'firm:'+firm.firm_id,child=>loadFamilies(child,firm.firm_id))}
async function loadFamilies(parent,firmId){parent.innerHTML='';for(const family of (await api(`/api/artifacts/families?firm_id=${encodeURIComponent(firmId)}`)).items)await expandable(parent,family.family_label,family.durable_artifact_count,`family:${firmId}:${family.family_id}`,child=>loadTypes(child,firmId,family.family_id))}
async function loadTypes(parent,firmId,familyId){parent.innerHTML='';for(const type of (await api(`/api/artifacts/types?firm_id=${encodeURIComponent(firmId)}&family_id=${encodeURIComponent(familyId)}`)).items)await expandable(parent,type.canonical_artifact_label,type.durable_artifact_count,`type:${firmId}:${type.canonical_artifact_id}`,child=>loadArtifacts(child,firmId,type.canonical_artifact_id,''))}
async function loadArtifacts(parent,firmId,typeId,cursor){if(!cursor)parent.innerHTML='';const params=new URLSearchParams({firm_id:firmId,canonical_artifact_id:typeId,order:'newest',limit:'25'});if(cursor)params.set('cursor',cursor);const page=await api('/api/artifacts?'+params);for(const item of page.items){const node=row(item.display_title,undefined,false,'artifact:'+item.document_id);node.button.onclick=()=>selectArtifact(item.document_id,node.button);parent.append(node.wrap)}if(page.next_cursor){const more=document.createElement('button');more.className='node-row';more.innerHTML='<span class="caret">+</span><span>Load more</span>';more.onclick=async()=>{more.disabled=true;await loadArtifacts(parent,firmId,typeId,page.next_cursor);more.remove()};parent.append(more)}}
function field(label,value,wide=false){return `<div class="field ${wide?'wide':''}"><b>${esc(label)}</b><span>${esc(value??'Unknown')}</span></div>`}
async function selectArtifact(documentId,button){selected=documentId;previewArtifact='';document.querySelectorAll('.node-row.selected').forEach(x=>x.classList.remove('selected'));button.classList.add('selected');$('empty').classList.add('hidden');$('artifact-view').classList.remove('hidden');$('title').textContent='Loading artifact…';$('preview').innerHTML='<div class="preview-state muted">Preview loading…</div>';try{const detail=await api('/api/artifacts/'+encodeURIComponent(documentId));if(selected!==documentId)return;$('observation-label').parentElement.classList.remove('hidden');renderDetail(detail)}catch(error){$('title').textContent='Artifact unavailable';$('subtitle').textContent=error.message;$('preview').innerHTML=`<div class="preview-state error">${esc(error.message)}</div>`}}
function renderDetail(detail){const s=detail.summary,o=detail.observation,content=`/api/artifacts/${encodeURIComponent(s.document_id)}/content`;observationCursor=detail.observation_cursor;$('document-actions').classList.remove('hidden');$('title').textContent=s.display_title;$('subtitle').textContent=`${s.firm_name} · ${s.family_label} · ${s.canonical_artifact_label}`;$('open-stored').href=content;$('open-source').classList.toggle('hidden',!detail.original_source_available);if(detail.original_source_url)$('open-source').href=detail.original_source_url;$('previous-observation').disabled=!detail.has_previous_observation;$('next-observation').disabled=!detail.has_next_observation;$('observation-label').textContent=`Observed ${o.observed_at}`;$('metadata').innerHTML=field('Firm',`${s.firm_name} (${s.firm_id})`)+field('Canonical artifact',s.canonical_artifact_label)+field('Provider / type',[s.provider,s.provider_artifact_type].filter(Boolean).join(' · ')||'Unknown')+field('Source-effective',`${s.source_effective.value} (${s.source_effective.basis})`)+field('Filing / publication date',s.filing_or_publication_date)+field('Period',s.period_date)+field('Document ID',s.document_id,true)+field('Artifact ID',s.artifact_id,true)+field('Media type',s.media_type)+field('Content size',`${s.content_size.toLocaleString()} bytes`)+field('Integrity',detail.content_integrity)+field('SHA-256',s.checksum_sha256,true)+field('Observation ID',o.observation_id,true)+field('Acquisition attempt',o.acquisition_attempt_id,true)+field('Observed at',o.observed_at)+field('Retrieval adapter',o.retrieval_adapter_id)+field('Source profile revision',o.source_profile_revision_id)+field('Provider IDs',JSON.stringify(o.provider_identifiers),true)+field('Diagnostics',JSON.stringify(o.diagnostics),true)+field('Provenance locations',o.provenance_locations.map(x=>x.location).join(' · ')||'Unavailable',true);if(previewArtifact!==s.artifact_id){previewArtifact=s.artifact_id;renderPreview(s,content)}}
async function navigateObservation(direction){const button=$(direction+'-observation');button.disabled=true;try{const detail=await api(`/api/artifacts/${encodeURIComponent(selected)}/observations/${direction}?cursor=${encodeURIComponent(observationCursor)}`);renderDetail(detail)}catch(error){$('observation-label').textContent=error.message;button.disabled=false}}
$('previous-observation').onclick=()=>navigateObservation('previous');$('next-observation').onclick=()=>navigateObservation('next');
function renderPreview(summary,url){const supported=summary.media_type==='text/html'||summary.media_type==='application/xhtml+xml'||summary.media_type==='application/pdf'||summary.media_type.startsWith('text/')||['application/json','application/xml'].includes(summary.media_type);if(!supported){$('preview').innerHTML=`<div class="preview-state"><h3>Safe inline preview unavailable</h3><p class="muted">${esc(summary.media_type)} is not rendered inline. Use Open stored document.</p></div>`;return}const frame=document.createElement('iframe');frame.title='Sandboxed stored artifact preview';frame.setAttribute('sandbox','');frame.referrerPolicy='no-referrer';frame.src=url;$('preview').replaceChildren(frame)}
async function loadMailingSources(parent,sources){parent.innerHTML='';if(!sources.length){parent.innerHTML='<div class="state">No mailing-list sources are configured.</div>';return}for(const source of sources)await expandable(parent,source.display_name,source.discussion_count,'list:'+source.source_id,child=>loadDiscussionGroups(child,source))}
async function loadDiscussionGroups(parent,source){parent.innerHTML='';await expandable(parent,'Discussions',source.discussion_count,'discussions:'+source.source_id,child=>loadDiscussions(child,source.source_id));await expandable(parent,'Incomplete or quarantined',undefined,'incomplete:'+source.source_id,child=>loadIncomplete(child,source.source_id))}
async function loadDiscussions(parent,sourceId){parent.innerHTML='';const items=(await api(`/api/mailing-lists/discussions?source_id=${encodeURIComponent(sourceId)}&limit=25`)).items;if(!items.length){parent.innerHTML='<div class="state">No connected discussions retained.</div>';return}for(const discussion of items)await expandable(parent,discussion.root_subject,discussion.message_count,`discussion:${discussion.discussion_id}`,child=>loadDiscussionRoot(child,discussion),button=>selectDiscussion(discussion,button))}
async function loadDiscussionRoot(parent,discussion){parent.innerHTML='';const detail=await api('/api/mailing-lists/messages/'+encodeURIComponent(discussion.root_message_key));appendMailMessage(parent,detail.summary)}
function discussionCompleteness(discussion){if(discussion.descendant_truncated)return 'Incomplete — acquisition stopped before configured context policy completed';if(discussion.connectivity_state!=='connected')return `Incomplete — ${discussion.connectivity_state} relationship graph`;if(discussion.descendant_policy_limited)return 'Complete — context retained through configured reply depth';return 'Complete within configured acquisition policy'}
function descendantStatus(discussion){if(discussion.descendant_truncated)return 'Unexpected truncation before policy completion';if(discussion.descendant_policy_limited)return 'Policy-limited — retained through configured depth';return 'Configured descendant policy completed'}
function selectDiscussion(discussion,button){selected='discussion:'+discussion.discussion_id;document.querySelectorAll('.node-row.selected').forEach(x=>x.classList.remove('selected'));button.classList.add('selected');$('empty').classList.add('hidden');$('artifact-view').classList.remove('hidden');$('document-actions').classList.add('hidden');$('observation-label').parentElement.classList.add('hidden');const completeness=discussionCompleteness(discussion),descendants=descendantStatus(discussion);$('title').textContent=discussion.root_subject;$('subtitle').textContent=`${discussion.list_id} · ${discussion.message_count.toLocaleString()} retained messages · ${completeness}`;$('metadata').innerHTML=field('Mailing list',discussion.list_id)+field('Retained discussion size',`${discussion.message_count.toLocaleString()} messages`)+field('Acquisition completion',completeness)+field('Required ancestry / connectivity',discussion.connectivity_state)+field('Descendant context',descendants)+field('Date span',[discussion.first_message_at,discussion.last_message_at].filter(Boolean).join(' through ')||'Dates unavailable')+field('Discussion ID',discussion.discussion_id,true)+field('Stored root message',discussion.root_message_key,true)+field('Root subject',discussion.root_subject,true);$('preview').innerHTML=`<section class="discussion-summary" aria-label="Discussion list summary"><h3>Retained discussion summary</h3><p>This read-only projection contains <strong>${discussion.message_count.toLocaleString()}</strong> retained messages from <strong>${esc(discussion.list_id)}</strong>.</p><dl><dt>Acquisition completion</dt><dd>${esc(completeness)}</dd><dt>Required ancestry / connectivity</dt><dd>${esc(discussion.connectivity_state)}</dd><dt>Retained date span</dt><dd>${esc([discussion.first_message_at,discussion.last_message_at].filter(Boolean).join(' through ')||'Dates unavailable')}</dd><dt>Descendant context</dt><dd>${esc(descendants)}</dd></dl><p class="muted">A configured reply-depth boundary is an intentional context policy, not an acquisition failure. Expand this discussion in the repository tree to inspect its retained messages.</p></section>`}
async function loadIncomplete(parent,sourceId){parent.innerHTML='';const items=(await api(`/api/mailing-lists/incomplete?source_id=${encodeURIComponent(sourceId)}`)).items;if(!items.length){parent.innerHTML='<div class="state">No incomplete material.</div>';return}items.forEach(item=>appendMailMessage(parent,item))}
function appendMailMessage(parent,item){const node=row(item.subject,item.child_count,item.child_count>0,'message:'+item.message_key);parent.append(node.wrap);let loaded=false,open=false;node.button.onclick=async()=>{selectMailMessage(item.message_key,node.button);if(!node.children)return;open=!open;node.button.querySelector('.caret').textContent=open?'▾':'▸';node.children.classList.toggle('hidden',!open);if(open&&!loaded){node.children.innerHTML='<div class="state">Loading replies…</div>';try{const children=(await api(`/api/mailing-lists/messages/${encodeURIComponent(item.message_key)}/children?limit=50`)).items;node.children.innerHTML='';children.forEach(child=>appendMailMessage(node.children,child));loaded=true}catch(error){node.children.innerHTML=`<div class="state error">${esc(error.message)}</div>`}}}}
async function selectMailMessage(messageKey,button){selected=messageKey;document.querySelectorAll('.node-row.selected').forEach(x=>x.classList.remove('selected'));button.classList.add('selected');$('empty').classList.add('hidden');$('artifact-view').classList.remove('hidden');$('title').textContent='Loading message…';$('preview').innerHTML='<div class="preview-state muted">Loading retained email…</div>';try{const detail=await api('/api/mailing-lists/messages/'+encodeURIComponent(messageKey));if(selected!==messageKey)return;renderMailDetail(detail)}catch(error){$('title').textContent='Message unavailable';$('subtitle').textContent=error.message}}
function splitStoredMessage(raw){const match=/\r\n\r\n|\n\n|\r\r/.exec(raw);if(!match)return {headers:raw,body:''};return {headers:raw.slice(0,match.index),body:raw.slice(match.index+match[0].length)}}
function enableMessageBodyScroll(region){region.addEventListener('wheel',event=>{if(!event.deltaY||region.scrollHeight<=region.clientHeight)return;const before=region.scrollTop;region.scrollTop+=event.deltaY;if(region.scrollTop!==before)event.preventDefault()},{passive:false});region.addEventListener('keydown',event=>{const page=Math.max(40,Math.floor(region.clientHeight*.85));const movements={ArrowDown:40,ArrowUp:-40,PageDown:page,PageUp:-page};if(event.key==='Home'){region.scrollTop=0;event.preventDefault();return}if(event.key==='End'){region.scrollTop=region.scrollHeight;event.preventDefault();return}if(!(event.key in movements))return;const before=region.scrollTop;region.scrollTop+=movements[event.key];if(region.scrollTop!==before)event.preventDefault()})}
function renderStoredMessage(raw){const parts=splitStoredMessage(raw),viewer=document.createElement('div');viewer.className='message-viewer';const headers=document.createElement('section');headers.className='message-headers';headers.setAttribute('aria-label','Raw message headers');const toggle=document.createElement('button');toggle.type='button';toggle.className='message-headers-toggle';toggle.setAttribute('aria-expanded','false');toggle.textContent=`▸ Raw message headers (${parts.headers.split(/\r\n|\n|\r/).length} lines)`;const headerContent=document.createElement('pre');headerContent.className='message-headers-content hidden';headerContent.tabIndex=0;headerContent.textContent=parts.headers;toggle.onclick=()=>{const open=toggle.getAttribute('aria-expanded')!=='true';toggle.setAttribute('aria-expanded',String(open));toggle.textContent=`${open?'▾':'▸'} Raw message headers (${parts.headers.split(/\r\n|\n|\r/).length} lines)`;headerContent.classList.toggle('hidden',!open)};headers.append(toggle,headerContent);const body=document.createElement('section');body.className='message-body';body.tabIndex=0;body.setAttribute('role','region');body.setAttribute('aria-label','Stored message body');const heading=document.createElement('h3');heading.textContent='Message body';const content=document.createElement('pre');content.textContent=parts.body||'(No message body retained.)';body.append(heading,content);enableMessageBodyScroll(body);viewer.append(headers,body);$('preview').replaceChildren(viewer)}
async function renderMailDetail(detail){const s=detail.summary,content=`/api/mailing-lists/messages/${encodeURIComponent(s.message_key)}/content`;$('document-actions').classList.remove('hidden');$('title').textContent=s.subject;$('subtitle').textContent=`${detail.source.display_name} · ${s.connectivity_state}`;$('open-stored').href=content;$('open-source').classList.toggle('hidden',!detail.provenance_locations.length);if(detail.provenance_locations.length)$('open-source').href=detail.provenance_locations[0];$('observation-label').parentElement.classList.add('hidden');$('metadata').innerHTML=field('Mailing list',`${detail.source.display_name} (${detail.source.list_id})`)+field('Sender',s.sender)+field('Message date',s.message_date)+field('Message-ID',s.external_message_id,true)+field('Immediate parent',s.immediate_parent_id,true)+field('Discussion',detail.discussion_id)+field('Stored root',detail.stored_root_message_key)+field('Connectivity',s.connectivity_state)+field('Inclusion reasons',detail.inclusion_reasons.join(' · '),true)+field('Acquisition runs',detail.acquisition_run_ids.join(' · '),true)+field('Relationship',detail.relationship_authority?`${detail.relationship_authority} · ${detail.relationship_certainty}`:'Root')+field('Missing parent',detail.missing_parent_reference)+field('Document ID',s.document_id,true)+field('Artifact ID',s.artifact_id,true)+field('Media type',detail.media_type)+field('Content size',`${detail.content_size.toLocaleString()} bytes`)+field('Integrity',detail.content_integrity)+field('SHA-256',detail.checksum_sha256,true)+field('Provenance',detail.provenance_locations.join(' · '),true);try{const response=await fetch(content);if(!response.ok)throw new Error('Stored content unavailable');renderStoredMessage(await response.text())}catch(error){$('preview').innerHTML=`<div class="preview-state error">${esc(error.message)}</div>`}}
async function loadStreams(parent,streams){parent.innerHTML='';if(!streams.length){parent.innerHTML='<div class="state">No artifact streams configured.</div>';return}for(const stream of streams)await expandable(parent,stream.name,stream.membership_count,'stream:'+stream.stream_id,child=>loadStreamGroups(child,stream))}
async function loadStreamGroups(parent,stream){parent.innerHTML='';const topology=row(`Upstream: ${stream.upstream_ids.join(', ')||'external'} · Consumers: ${stream.consumer_ids.join(', ')||'none'}`,undefined,false,'stream-topology:'+stream.stream_id);topology.button.disabled=true;parent.append(topology.wrap);await expandable(parent,'Current memberships',stream.membership_count,'stream-memberships:'+stream.stream_id,child=>loadStreamMemberships(child,stream.stream_id));await expandable(parent,'Execution runs',undefined,'stream-runs:'+stream.stream_id,child=>loadStreamRuns(child,stream.stream_id))}
async function loadStreamMemberships(parent,streamId){parent.innerHTML='';const items=(await api(`/api/streams/${encodeURIComponent(streamId)}/memberships?limit=100`)).items;if(!items.length){parent.innerHTML='<div class="state">No published memberships.</div>';return}items.forEach(item=>{const node=row(`${item.projection.title} · ${item.inclusion_kind}`,undefined,false,'membership:'+item.membership_id);node.button.onclick=()=>selectStreamMembership(item.membership_id,node.button);parent.append(node.wrap)})}
async function loadStreamRuns(parent,streamId){parent.innerHTML='';const items=(await api(`/api/streams/${encodeURIComponent(streamId)}/runs`)).items;if(!items.length){parent.innerHTML='<div class="state">Never run.</div>';return}items.forEach(item=>{const node=row(`${item.status} · ${item.requested_at}`,item.direct_count+item.context_count,false,'stream-run:'+item.run_id);node.button.disabled=true;parent.append(node.wrap)})}
async function selectStreamMembership(membershipId,button){selected=membershipId;document.querySelectorAll('.node-row.selected').forEach(x=>x.classList.remove('selected'));button.classList.add('selected');$('empty').classList.add('hidden');$('artifact-view').classList.remove('hidden');$('title').textContent='Loading stream membership…';try{const detail=await api('/api/stream-memberships/'+encodeURIComponent(membershipId));renderStreamMembership(detail)}catch(error){$('title').textContent='Membership unavailable';$('subtitle').textContent=error.message}}
async function renderStreamMembership(detail){const p=detail.projection,content=`/api/stream-memberships/${encodeURIComponent(detail.membership_id)}/content`;$('document-actions').classList.remove('hidden');$('title').textContent=p.title;$('subtitle').textContent=`${detail.stream_id} · ${detail.inclusion_kind} · ${detail.inclusion_reason}`;$('open-stored').href=content;$('open-source').classList.add('hidden');$('observation-label').parentElement.classList.add('hidden');$('metadata').innerHTML=field('Stream',detail.stream_id)+field('Stream revision',detail.revision_id)+field('Execution run',detail.run_id)+field('Inclusion',`${detail.inclusion_kind} · ${detail.inclusion_reason}`)+field('Expansion',detail.expansion_strategy)+field('Completeness',detail.completeness)+field('Schema',p.schema_id)+field('Source',p.source_id)+field('Effective timestamp',p.effective_at)+field('Document ID',detail.document_id,true)+field('Artifact ID',detail.artifact_id,true)+field('Registered attributes',JSON.stringify(p.attributes),true)+field('Upstream / seed lineage',JSON.stringify(detail.lineage),true);try{const response=await fetch(content);if(!response.ok)throw new Error('Stored content unavailable');const pre=document.createElement('pre');pre.className='preview-state';pre.style.whiteSpace='pre-wrap';pre.style.margin='0';pre.textContent=await response.text();$('preview').replaceChildren(pre)}catch(error){$('preview').innerHTML=`<div class="preview-state error">${esc(error.message)}</div>`}}
const collapsed=preferences.read(COLLAPSED,false,x=>typeof x==='boolean');function setCollapsed(value){$('metadata').classList.toggle('hidden',value);$('metadata-toggle').textContent=(value?'▸':'▾')+' Normalized metadata';$('metadata-toggle').setAttribute('aria-expanded',String(!value));preferences.write(COLLAPSED,value)}setCollapsed(collapsed);$('metadata-toggle').onclick=()=>setCollapsed(!$('metadata').classList.contains('hidden'));
const split=preferences.read(SPLIT,34,x=>typeof x==='number'&&x>=22&&x<=60);function setSplit(value){value=Math.max(22,Math.min(60,value));$('layout').style.gridTemplateColumns=`minmax(280px,${value}%) 7px minmax(420px,1fr)`;preferences.write(SPLIT,value)}setSplit(split);$('divider').onpointerdown=event=>{event.preventDefault();const move=e=>setSplit((e.clientX/$('layout').clientWidth)*100),up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up)};addEventListener('pointermove',move);addEventListener('pointerup',up)};
loadRepository();
</script>
</body></html>
